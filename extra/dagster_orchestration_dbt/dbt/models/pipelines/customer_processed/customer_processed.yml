version: 2

models:
  - name: customer_processed
    description: demo of processed customer data from raw customer data
    columns:
      - name: new_customer_id
        description: This is a unique identifier for a customer that we processed
        tests:
          - unique
          - not_null
      - name: new_last_name
        description: Customer's last name that we processed # last name should not have a unique test, changed to warn first
        tests:
          - unique:
              arguments:
                severity: warn # accepts only `error` and `warn` default: error
          - not_null

